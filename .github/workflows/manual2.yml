name: Manual2 workflow

on:
  workflow_dispatch:
    inputs:
      name:
        description: Name
        type: string
        default: test

      age:
        description: Age
        type: number
        required: true

jobs:
  manual:
    runs-on: ubuntu-latest

    steps:
      - name: Print Name
        run: echo "${{ inputs.name }}"

      - name: Print Age
        run: echo "${{ inputs.age }}"
